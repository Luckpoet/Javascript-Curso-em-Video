<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagens</title>
    <style>
        .btn {
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Desafio das Mensagens</h1>
    <input type="button" value="Botão 1" class="btn" onclick="clique(1)">
    <input type="button" value="Botão 2" class="btn" onclick="clique(2)">
    <input type="button" value="Botão 3" class="btn" onclick="clique(3)">

    <script>
        function clique (num) {
            window.alert(`Você clicou no ${num}º botão!`);
        }
    </script>
</body>
</html>
